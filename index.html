<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script>
    // Subpath guard: when served under /light-it-up (especially without a trailing
    // slash), pin a <base> so relative assets resolve under the subpath instead of the
    // site root. Runs before the stylesheet/module load; no-op at the root (local dev).
    if (location.pathname.indexOf('/light-it-up') === 0) {
      var b = document.createElement('base');
      b.href = '/light-it-up/';
      document.head.appendChild(b);
    }
  </script>

  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-N2CRFVBS');</script>
  <!-- End Google Tag Manager -->

  <title>Light it Up — MLB total bases</title>
  <meta name="description" content="Light it Up — search an active MLB hitter and watch their season light up like a scoreboard: total bases per game, at a glance.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='6'%20fill='%23090d12'/%3E%3Crect%20x='6'%20y='6'%20width='8'%20height='8'%20rx='2'%20fill='%232f7d4a'/%3E%3Crect%20x='18'%20y='6'%20width='8'%20height='8'%20rx='2'%20fill='%239dffba'/%3E%3Crect%20x='6'%20y='18'%20width='8'%20height='8'%20rx='2'%20fill='%235be684'/%3E%3Crect%20x='18'%20y='18'%20width='8'%20height='8'%20rx='2'%20fill='%2317241d'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N2CRFVBS"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <a class="skip-link" href="#search-field">Skip to search</a>

  <div class="shell">
    <header class="masthead">
      <div class="masthead__lockup">
        <h1 class="masthead__title">Light it Up</h1>
      </div>
      <nav class="league-switch" role="tablist" aria-label="Choose a league">
        <button class="league-tab" role="tab" type="button" data-league-id="mlb" id="tab-mlb" aria-selected="true">MLB</button>
        <button class="league-tab" role="tab" type="button" data-league-id="nhl" id="tab-nhl" aria-selected="false">NHL</button>
        <button class="league-tab" role="tab" type="button" data-league-id="nfl" id="tab-nfl" aria-selected="false">NFL</button>
        <button class="league-tab" role="tab" type="button" data-league-id="nba" id="tab-nba" aria-selected="false">NBA</button>
        <button class="league-tab" role="tab" type="button" data-league-id="wnba" id="tab-wnba" aria-selected="false">WNBA</button>
        <button class="league-tab" role="tab" type="button" data-league-id="pwhl" id="tab-pwhl" aria-selected="false">PWHL</button>
      </nav>
      <p class="masthead__sub" id="masthead-sub">See <strong>total bases</strong> per game for any active MLB hitter.</p>
    </header>

    <main class="main">
      <form class="search" role="search" autocomplete="off" onsubmit="return false">
        <label class="search__label" for="search-field">Search player</label>
        <div class="search__field">
          <svg class="search__icon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
            <path d="M8.5 3a5.5 5.5 0 0 1 4.23 9.02l3.62 3.62-1.06 1.06-3.62-3.62A5.5 5.5 0 1 1 8.5 3Zm0 1.6a3.9 3.9 0 1 0 0 7.8 3.9 3.9 0 0 0 0-7.8Z" fill="currentColor"/>
          </svg>
          <input id="search-field" type="text" placeholder="e.g. Aaron Judge"
                 role="combobox" aria-expanded="false" aria-controls="suggestions"
                 aria-autocomplete="list" aria-label="Search for an active MLB player">
        </div>
        <ul id="suggestions" class="suggestions hidden" role="listbox" aria-label="Player suggestions"></ul>
      </form>

      <!-- The board: all 162 game slots, always present. -->
      <section id="board" class="panel board">
        <header id="nameplate" class="nameplate hidden"></header>
        <div id="grid" class="grid" role="group" aria-label="2026 season board"></div>
        <div id="legend" class="legend hidden">
          <span class="legend__group">
            <span class="legend__label">Fewer bases</span>
            <span class="legend__scale" aria-hidden="true">
              <span class="cell" data-state="played" data-level="0"></span>
              <span class="cell" data-state="played" data-level="1"></span>
              <span class="cell" data-state="played" data-level="2"></span>
              <span class="cell" data-state="played" data-level="3"></span>
              <span class="cell" data-state="played" data-level="4"></span>
            </span>
            <span class="legend__label">More bases</span>
          </span>
          <span class="legend__note">
            <span class="cell" data-state="missed" aria-hidden="true"></span>
            Did not play
          </span>
          <span class="legend__note">
            <span class="cell" data-state="future" aria-hidden="true"></span>
            Not yet played
          </span>
        </div>
      </section>

      <div id="error-msg" class="alert hidden" role="alert"></div>
      <p id="sr-status" class="sr-only" role="status" aria-live="polite"></p>
    </main>

    <footer class="colophon">
      <span>Built by <a href="https://www.whatadewitt.com" rel="noopener">Luke DeWitt</a> · Data: <span id="data-source">MLB StatsAPI</span> · not affiliated with any league or data provider</span>
    </footer>
  </div>

  <div id="tooltip" class="tooltip hidden" role="tooltip" aria-live="polite">
    <div id="tooltip-matchup" class="tooltip__matchup"></div>
    <div id="tooltip-line" class="tooltip__line"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
